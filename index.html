<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hixbeily - Centro de Propósito</title>
    
    <!-- Librerías de React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Configuración Global para Lucide -->
    <script>window.React = React; window.ReactDOM = ReactDOM;</script>

    <!-- Iconos y Estilos -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --rose-soft: #fffafa;
            --rose-accent: #f472b6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--rose-soft);
            color: #1a1a1a;
            scroll-behavior: smooth;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-active {
            color: var(--rose-accent);
        }

        .icon-accent { color: var(--rose-accent); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const Lucide = window.LucideReact || {};

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const IconComponent = Lucide[name];
            if (!IconComponent) return null;
            return <IconComponent size={size} className={className} fill={fill} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('inicio');
            const [selectedDay, setSelectedDay] = useState(new Date().getDate() - 1);
            const [garden, setGarden] = useState([]);
            const [isPlaying, setIsPlaying] = useState(false);
            const [victories, setVictories] = useState(() => Number(localStorage.getItem('hix_victories')) || 0);
            
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('hix_tasks');
                return saved ? JSON.parse(saved) : [
                    { id: 1, text: "Revisar anatomía bovina", completed: false },
                    { id: 2, text: "Orar por mis metas", completed: true }
                ];
            });
            const [newTask, setNewTask] = useState("");
            const [journalEntry, setJournalEntry] = useState(() => localStorage.getItem('hix_journal') || "");

            const [timer, setTimer] = useState(25 * 60);
            const [isTimerActive, setIsTimerActive] = useState(false);

            useEffect(() => localStorage.setItem('hix_tasks', JSON.stringify(tasks)), [tasks]);
            useEffect(() => localStorage.setItem('hix_journal', journalEntry), [journalEntry]);
            useEffect(() => localStorage.setItem('hix_victories', victories), [victories]);

            useEffect(() => {
                let interval = null;
                if (isTimerActive && timer > 0) {
                    interval = setInterval(() => setTimer(t => t - 1), 1000);
                } else {
                    clearInterval(interval);
                    if (timer === 0) setIsTimerActive(false);
                }
                return () => clearInterval(interval);
            }, [isTimerActive, timer]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const monthlyMessages = [
                "Tu valor no tiene precio.", "Dios guía tus pasos hoy.", "Eres una gran zootecnista.",
                "La paciencia rinde frutos.", "Confía en tu proceso.", "Eres luz para otros.",
                "Cuida tu corazón.", "Un día a la vez.", "Tu vocación es sagrada.",
                "Sé valiente y esforzada.", "El campo te espera.", "Amas lo que haces.",
                "Eres capaz de todo.", "Tu fe te sostiene.", "La creación te agradece.",
                "Respira y sigue.", "Eres inspiración.", "Dios es tu fuerza.",
                "Siembra amor siempre.", "Tus manos sanan.", "Sueña en grande.",
                "No te rindas jamás.", "Tu paz es prioridad.", "Eres bendecida.",
                "El éxito es persistir.", "Ama a los animales.", "Sirve con alegría.",
                "Eres única, Hixbeily.", "Todo pasa por algo.", "Brilla con luz propia.",
                "Mañana será mejor."
            ];

            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;
                setTasks([{ id: Date.now(), text: newTask, completed: false }, ...tasks]);
                setNewTask("");
            };

            const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

            const plantSeed = (type) => {
                const newPlant = { id: Date.now(), x: Math.random() * 80 + 10, y: Math.random() * 80 + 10, type, size: 0 };
                setGarden([...garden, newPlant]);
                setTimeout(() => setGarden(prev => prev.map(p => p.id === newPlant.id ? {...p, size: 1} : p)), 100);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* NAV SUPERIOR - SIN CONTENEDORES DE ICONOS */}
                    <nav className="fixed top-0 w-full glass-card z-50 px-8 py-5 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('inicio')}>
                            <Icon name="Leaf" className="text-pink-500" size={28} />
                            <div className="hidden sm:flex flex-col">
                                <span className="font-serif italic text-2xl text-pink-700 font-bold leading-none">Hixbeily</span>
                            </div>
                        </div>
                        
                        <div className="flex gap-6 items-center">
                            {[
                                { id: 'inicio', icon: 'Home' },
                                { id: 'pendientes', icon: 'CheckCircle' },
                                { id: 'agenda', icon: 'Calendar' },
                                { id: 'juego', icon: 'Sparkles' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)} 
                                    className={`transition-colors ${activeTab === tab.id ? 'tab-active' : 'text-gray-300 hover:text-pink-300'}`}
                                >
                                    <Icon name={tab.icon} size={24} />
                                </button>
                            ))}
                            <button 
                                onClick={() => setActiveTab('apoyo')} 
                                className={`text-[11px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === 'apoyo' ? 'text-rose-500' : 'text-gray-400'}`}
                            >
                                SOS
                            </button>
                        </div>
                    </nav>

                    <main className="pt-32 px-6 max-w-4xl mx-auto space-y-16">
                        
                        {activeTab === 'inicio' && (
                            <div className="fade-in space-y-16">
                                <header className="text-center">
                                    <h1 className="text-6xl md:text-8xl font-serif text-pink-950 mb-4 animate-float">
                                        Cuidar es <span className="text-pink-500 italic">Amar</span>
                                    </h1>
                                    <p className="text-gray-400 font-bold tracking-[0.3em] uppercase text-[10px]">Hixbeily • Propósito Vivo</p>
                                </header>

                                {/* DASHBOARD SIN ESPACIOS EN ICONOS */}
                                <section className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="text-center space-y-2">
                                        <Icon name="Trophy" className="text-pink-400 mx-auto" size={32} />
                                        <div className="text-4xl font-serif font-bold text-pink-900">{victories}</div>
                                        <div className="text-[10px] uppercase font-black text-gray-300 tracking-widest">Victorias</div>
                                        <button onClick={() => setVictories(v => v + 1)} className="text-[9px] text-pink-400 font-bold hover:underline tracking-tighter uppercase">+ Sumar una</button>
                                    </div>

                                    <div className="text-center space-y-2">
                                        <Icon name="Timer" className="text-green-500 mx-auto" size={32} />
                                        <div className="text-4xl font-serif font-bold text-green-900">{formatTime(timer)}</div>
                                        <div className="text-[10px] uppercase font-black text-gray-300 tracking-widest">Enfoque</div>
                                        <button 
                                            onClick={() => setIsTimerActive(!isTimerActive)} 
                                            className={`text-[9px] font-bold uppercase tracking-tighter hover:underline ${isTimerActive ? 'text-red-400' : 'text-green-500'}`}
                                        >
                                            {isTimerActive ? 'Pausar' : 'Empezar'}
                                        </button>
                                    </div>

                                    <div className="text-center space-y-2">
                                        <Icon name="ListTodo" className="text-blue-400 mx-auto" size={32} />
                                        <div className="text-4xl font-serif font-bold text-blue-900">{tasks.filter(t => !t.completed).length}</div>
                                        <div className="text-[10px] uppercase font-black text-gray-300 tracking-widest">Tareas</div>
                                        <button onClick={() => setActiveTab('pendientes')} className="text-[9px] text-blue-400 font-bold hover:underline tracking-tighter uppercase">Gestionar</button>
                                    </div>
                                </section>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div className="bg-pink-950 rounded-[3rem] p-12 text-white relative overflow-hidden shadow-2xl">
                                        <h3 className="text-pink-400 font-bold uppercase tracking-widest text-[10px] mb-8">Reflexión</h3>
                                        <p className="text-2xl font-serif italic leading-relaxed">
                                            "Hixbeily, lo que hoy parece difícil, mañana será tu testimonio. El campo te espera."
                                        </p>
                                    </div>
                                    <div className="space-y-8 py-4">
                                        <h3 className="text-pink-900 font-serif italic text-3xl">Mapa de Sueños</h3>
                                        <div className="space-y-6">
                                            {[
                                                { label: "Graduarme con honores", icon: "GraduationCap", color: "text-blue-400" },
                                                { label: "Mi propia finca sostenible", icon: "Home", color: "text-green-500" },
                                                { label: "Bienestar animal integral", icon: "Heart", color: "text-pink-400" }
                                            ].map((dream, i) => (
                                                <div key={i} className="flex items-center gap-5 group cursor-default">
                                                    <Icon name={dream.icon} size={22} className={`${dream.color} group-hover:scale-110 transition-transform`} />
                                                    <span className="text-sm font-medium text-gray-600 border-b border-pink-50 pb-1 w-full">{dream.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pendientes' && (
                            <div className="fade-in space-y-12">
                                <div className="glass-card rounded-[3rem] p-12">
                                    <h2 className="text-4xl font-serif text-pink-950 italic mb-10">Pendientes</h2>
                                    <form onSubmit={addTask} className="flex gap-4 mb-12 border-b border-pink-100 pb-4">
                                        <input 
                                            type="text" 
                                            value={newTask}
                                            onChange={(e) => setNewTask(e.target.value)}
                                            placeholder="¿Qué haremos hoy?"
                                            className="flex-1 bg-transparent text-xl font-serif focus:outline-none placeholder:text-pink-200"
                                        />
                                        <button type="submit" className="text-pink-500 hover:scale-110 transition-transform">
                                            <Icon name="Plus" size={32} />
                                        </button>
                                    </form>
                                    <div className="space-y-6 max-h-[500px] overflow-y-auto no-scrollbar">
                                        {tasks.map(task => (
                                            <div key={task.id} className="flex items-center justify-between group">
                                                <div className="flex items-center gap-6 flex-1 cursor-pointer" onClick={() => toggleTask(task.id)}>
                                                    <Icon 
                                                        name={task.completed ? "CheckCircle" : "Circle"} 
                                                        size={24} 
                                                        className={task.completed ? "text-green-500" : "text-pink-200"} 
                                                    />
                                                    <span className={`text-xl font-serif ${task.completed ? 'line-through text-stone-300' : 'text-gray-700'}`}>{task.text}</span>
                                                </div>
                                                <button onClick={() => deleteTask(task.id)} className="text-gray-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="Trash2" size={20} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="px-6">
                                    <h3 className="text-xl font-serif text-pink-900 mb-6 flex items-center gap-3">Diario</h3>
                                    <textarea 
                                        value={journalEntry} 
                                        onChange={(e) => setJournalEntry(e.target.value)} 
                                        placeholder="Escribe aquí tus oraciones y alegrías..." 
                                        className="w-full h-48 bg-transparent border-l border-pink-100 pl-8 focus:outline-none italic text-gray-500 text-lg leading-relaxed" 
                                    />
                                </div>
                            </div>
                        )}

                        {activeTab === 'agenda' && (
                            <div className="fade-in space-y-12">
                                <h2 className="text-3xl font-serif text-pink-900 italic text-center">Semillas de Propósito</h2>
                                <div className="grid grid-cols-7 gap-2 max-w-sm mx-auto">
                                    {monthlyMessages.map((msg, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => setSelectedDay(idx)} 
                                            className={`h-10 text-[11px] font-bold rounded-full transition-all ${selectedDay === idx ? 'bg-pink-500 text-white shadow-lg' : 'text-gray-400 hover:text-pink-300'}`}
                                        >
                                            {idx + 1}
                                        </button>
                                    ))}
                                </div>
                                <div className="text-center py-16 space-y-6 border-y border-pink-50">
                                    <Icon name="Leaf" className="text-green-400 mx-auto" size={32} />
                                    <p className="text-4xl text-green-950 italic font-serif leading-relaxed max-w-xl mx-auto">"{monthlyMessages[selectedDay]}"</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'juego' && (
                            <div className="fade-in">
                                <div className="bg-stone-900 rounded-[4rem] p-16 text-white relative overflow-hidden min-h-[600px] shadow-2xl">
                                    <h2 className="text-5xl font-serif mb-4 text-green-400 italic">Jardín Zen</h2>
                                    <p className="text-stone-500 mb-12 text-xs tracking-widest uppercase font-bold">Planta tus valores</p>
                                    
                                    <div className="flex gap-10 mb-20 justify-center">
                                        {[
                                            { id: 'flower', icon: 'Heart', color: 'text-pink-400' },
                                            { id: 'tree', icon: 'Sprout', color: 'text-green-400' },
                                            { id: 'star', icon: 'Star', color: 'text-yellow-400' }
                                        ].map(btn => (
                                            <button 
                                                key={btn.id}
                                                onClick={() => plantSeed(btn.id)} 
                                                className="hover:scale-125 transition-transform"
                                            >
                                                <Icon name={btn.icon} className={btn.color} size={32} fill={btn.id === 'flower' ? "currentColor" : "none"} />
                                            </button>
                                        ))}
                                    </div>

                                    <div className="relative w-full h-[300px] overflow-hidden">
                                        {garden.map((item) => (
                                            <div 
                                                key={item.id} 
                                                className="absolute transition-all duration-1000 transform" 
                                                style={{ left: `${item.x}%`, top: `${item.y}%`, transform: `scale(${item.size})`, opacity: item.size }}
                                            >
                                                {item.type === 'flower' && <Icon name="Heart" className="text-pink-500" fill="currentColor" size={40} />}
                                                {item.type === 'tree' && <Icon name="Sprout" className="text-green-500" size={50} />}
                                                {item.type === 'star' && <Icon name="Star" className="text-yellow-400" fill="currentColor" size={30} />}
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setGarden([])} className="absolute bottom-8 right-12 text-[9px] text-stone-600 uppercase font-bold tracking-[0.3em] hover:text-white">Limpiar</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'apoyo' && (
                            <div className="fade-in">
                                <div className="bg-rose-100 rounded-[5rem] p-20 text-center relative border-2 border-rose-200">
                                    <Icon name="Heart" className="text-rose-500 mx-auto mb-10 animate-pulse" size={56} fill="currentColor" />
                                    <h2 className="text-5xl font-serif text-rose-950 italic mb-8">No estás sola</h2>
                                    <p className="text-rose-800 text-2xl leading-relaxed max-w-2xl mx-auto mb-20 italic">
                                        "Cuando el camino sea pesado, recuerda que Dios te llamó por tu nombre. Estás formando un corazón de oro."
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16 text-left border-t border-rose-200 pt-16">
                                        <div>
                                            <h3 className="font-bold text-rose-900 mb-4 text-2xl font-serif italic text-left">Tu Valor</h3>
                                            <p className="text-rose-800 text-lg text-left opacity-80">Eres la voz de los que no tienen voz. Tu sensibilidad es tu mayor fuerza.</p>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-rose-900 mb-4 text-2xl font-serif italic text-left">Tu Escudo</h3>
                                            <p className="text-rose-800 text-lg text-left opacity-80">"Pon en manos del Señor tus obras y tus proyectos se cumplirán."</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-24 pb-20 text-center space-y-4">
                        <Icon name="PawPrint" className="text-pink-100 mx-auto" size={40} />
                        <p className="font-serif text-3xl text-pink-900 italic">"Tus manos cuidan lo que Dios creó."</p>
                        <p className="text-gray-300 text-[10px] tracking-[0.4em] uppercase font-black">Danna • Con Amor Infinito</p>
                    </footer>

                    {/* AUDIO UI SIN CÍRCULO DE FONDO */}
                    <div className="fixed bottom-10 right-10 z-50">
                        <button 
                            onClick={() => setIsPlaying(!isPlaying)} 
                            className="flex items-center gap-4 group"
                        >
                            <div className="flex flex-col items-end opacity-0 group-hover:opacity-100 transition-opacity">
                                <span className="text-[10px] font-black uppercase text-pink-500 tracking-widest">{isPlaying ? 'Ambiente de Paz' : 'Calma'}</span>
                            </div>
                            <Icon 
                                name="Music" 
                                size={28} 
                                className={`transition-all ${isPlaying ? 'text-pink-500 animate-spin-slow' : 'text-gray-300'}`} 
                            />
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
